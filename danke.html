<!DOCTYPE html>
<html lang="de-AT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Danke für Ihre Anfrage | Fotoabenteuer</title>
<meta name="description" content="Ihre Anfrage wurde erfolgreich gesendet. Wir melden uns schnellstmöglich bei Ihnen.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://fotoabenteuer.com/danke.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--midnight:#0B1120;--navy:#1E3A8A;--electric:#3B82F6;--flash:#F59E0B;--snow:#F8FAFC;--white:#FFFFFF;--text:#0F172A;--muted:#475569;--border:#E2E8F0;--border-dk:#1E293B;--success:#22C55E;--radius-md:12px;--radius-lg:16px;--radius-xl:24px}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--snow);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3{font-family:'Syne',system-ui,sans-serif;line-height:1.15;letter-spacing:-.02em}
a{color:inherit;text-decoration:none}
.icon{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.icon-sm{width:20px;height:20px}
.header{background:var(--midnight);padding:16px 24px;border-bottom:1px solid var(--border-dk)}
.logo-link{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:1.25rem;color:var(--white);max-width:1200px;margin:0 auto}
.logo-flash{width:8px;height:8px;border-radius:50%;background:var(--flash);box-shadow:0 0 8px var(--flash)}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-xl);padding:40px;max-width:560px;width:100%;text-align:center;box-shadow:0 4px 12px rgba(11,17,32,.08)}
.check-circle{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.check-icon{width:36px;height:36px;color:var(--success)}
.card h1{font-size:1.5rem;font-weight:700;color:var(--navy);margin-bottom:8px}
.card>p{color:var(--muted);margin-bottom:20px}
.summary{background:var(--snow);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;text-align:left;margin-bottom:24px}
.summary h3{font-size:.875rem;font-weight:600;color:var(--navy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:.875rem;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.summary-label{color:var(--muted)}
.summary-val{font-weight:500;color:var(--text)}
.hint{font-size:.875rem;color:var(--muted);margin-bottom:24px;padding:12px 16px;background:rgba(59,130,246,.04);border-radius:var(--radius-md);border:1px solid rgba(59,130,246,.08)}
.actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;border-radius:var(--radius-md);transition:transform .2s,box-shadow .2s;cursor:pointer;white-space:nowrap;line-height:1;padding:14px 28px;font-size:1rem}
.btn:active{transform:scale(.97)}
.btn-flash{background:var(--flash);color:var(--midnight);box-shadow:0 4px 16px rgba(245,158,11,.3)}
.btn-flash:hover{background:#e69009;transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--text);border:2px solid var(--border);padding:12px 24px;font-size:.9375rem}
.btn-outline:hover{border-color:var(--electric);color:var(--electric)}
.btn-wa{background:#25D366;color:#fff}
.btn-wa:hover{background:#1ebe57;transform:translateY(-2px)}
.footer{background:var(--midnight);padding:24px;text-align:center;color:rgba(255,255,255,.4);font-size:.8125rem}
</style>
</head>
<body>
<header class="header">
  <a href="/" class="logo-link"><span class="logo-flash"></span>Fotoabenteuer</a>
</header>
<main class="main">
  <div class="card">
    <div class="check-circle">
      <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <h1 id="headline">Danke für Ihre Anfrage!</h1>
    <p>Ihre Nachricht wurde erfolgreich gesendet.</p>

    <div id="summaryBox" class="summary" style="display:none">
      <h3>Ihre Anfrage im Überblick</h3>
      <div id="summaryRows"></div>
    </div>

    <div class="hint">Wir melden uns meist innerhalb von 24 Stunden bei Ihnen.</div>

    <div class="actions">
      <a href="/" class="btn btn-flash">Zurück zur Startseite</a>
      <a href="tel:+436641852634" class="btn btn-outline">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Anrufen</a>
      <a href="https://wa.me/436641852634" class="btn btn-wa" target="_blank" rel="noopener">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" fill="currentColor" stroke="none"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>WhatsApp</a>
    </div>
  </div>
</main>
<footer class="footer">&copy; 2025 Fotoabenteuer – Alexander Fodermayer</footer>

<script>
(function(){
  function esc(s){
    if(!s)return'';
    s=String(s).substring(0,200);
    var d=document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }
  var p=new URLSearchParams(location.search);
  var name=esc(p.get('name'));
  var paket=esc(p.get('paket'));
  var anlass=esc(p.get('anlass'));
  var datum=esc(p.get('datum'));
  var ort=esc(p.get('ort'));

  if(name){
    document.getElementById('headline').textContent='Danke, '+name+'!';
  }

  var rows=[];
  if(paket)rows.push(['Paket',paket]);
  if(anlass)rows.push(['Anlass',anlass]);
  if(datum)rows.push(['Datum',datum]);
  if(ort)rows.push(['Ort',ort]);

  if(rows.length){
    var box=document.getElementById('summaryBox');
    var container=document.getElementById('summaryRows');
    rows.forEach(function(r){
      var div=document.createElement('div');
      div.className='summary-row';
      div.innerHTML='<span class="summary-label">'+r[0]+'</span><span class="summary-val">'+r[1]+'</span>';
      container.appendChild(div);
    });
    box.style.display='block';
  }
})();
</script>
<script src="/cookies.js" defer></script>
</body>
</html>
